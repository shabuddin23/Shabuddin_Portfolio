<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tables
    </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Assignment</h1>
    <h2 style="text-align: center;">Question - : tables </h2>
    <div style="text-align: center;"></div>
    <table class="table table-dark table-striped  table-hover table-responsive" border="1" cellpadding="5"
        style="text-align: center; width:94%; margin:auto;">
        <tbody id="table"></tbody>

    </table>
    <script>
        //tables in Tables
        const table = document.getElementById("table");
        const upto = 10
        const tables = 10
        for (j = 1; j <= upto; j++) {
            //for switching tables 
            let tr = document.createElement("tr")
            for (i = 1; i <= tables; i++) {
                let td = document.createElement("td")
                var res = i * j
                td.textContent = i + " * " + j + " = " + res
                tr.appendChild(td)

            }
            table.appendChild(tr)
        }

    </script>
</body>

</html>

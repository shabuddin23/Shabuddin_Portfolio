<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Assignment – 1 </h1>
    <h1>Question - 3 : JavaScript DataTypes</h1>
    <h2>
        They are divided into two types<br>
        1.primitive types <br>
        2. non-primitive types<br>
    </h2>
    <h3>Note: in java script the datatypes are implicit</h3>
    <div id="primitive" style="border:1px solid black; padding:10px; width:600px;">
        <script>
            //1.1 Number
            let a = 20;
            let b = 6.5;
            document.getElementById("primitive").innerHTML += "These two  number are  datatype : " + "<span style=color:'#003300;font-weight:500;'>" + a + "," + b + "<br>" + "</span>";

            //1.2 String
            let name = "shabuddin";
            document.getElementById("primitive").innerHTML += "It is string datatype : " + "<span style=color:'#003300;font-weight:500;'>" + + name + "<br>" + "</span>";
            
            //1.3 Boolean - true or false
            let bool = true;
            document.getElementById("primitive").innerHTML += "It is Boolean datatype : " + "<span style=color:'#003300;font-weight:500;'>" + bool + "<br>" + "</span>";
            
            //1.4 null
            let n = null;
            document.getElementById("primitive").innerHTML += "It is null datatype : " + "<span style=color:'#003300;font-weight:500;'>" + n + "<br>" + "</span>";
            
            //1.5 bignint- if number exceed the value that value is directly shifted to bigint
            let num = 123456789123456789123456789n;
            document.getElementById("primitive").innerHTML += "It is BigInt datatype : " + "<span style=color:'#003300;font-weight:500;'>" + num + "<br>" + "</span>";
            
            //1.6 Undefined -declared but no value assigned
            let x;
            document.getElementById("primitive").innerHTML += "It is Undefined datatype : " + "<span style=color:'#003300;font-weight:500;'>" + x + "<br>" + "</span>";
            
            //1.7 Symbol -used for solving conflicts used as hidden element
            let id = Symbol("id")
            id = 100;
            document.getElementById("primitive").innerHTML += "It is symbol datatype :" + id + "<br>";
       
        </script>

    </div>
    <div id="non-primitive" style="border:1px solid black; padding:10px; width:600px;">
        <script>
            
            //2.1 object -stores key-value pair
            let employee = {
                name: "jhon", salary: 25000
            }
            document.getElementById("non-primitive").innerHTML += "It is object datatype : " + "<span style=color:'#003300;font-weight:500;'>" + employee.name + "," + employee.salary + "<br>" + "</span>"+"<br>";
            
            //2.2 Array -collection of elements
            /*
                array methods 
                push()
                pop()
                unshift()
                shift()
                splice()
            */
            let array = [1, "john", 2, "raju", 3, "ramu"];
            document.getElementById("non-primitive").innerHTML += "It is Array datatype : " + "<span style=color:'#003300;font-weight:500;'>" + array.join(", ") + "<br>" + "</span>"+"<br>";

            document.getElementById("non-primitive").innerHTML+="<b>"+"Array Methods :"+"</b>"+"<br>"+"1.push (add at last):"+"<br>";
            array.push(4);
            document.getElementById("non-primitive").innerHTML+="After push operation 4 added(updated array) : "+array.join(", ")+"<br>";

            document.getElementById("non-primitive").innerHTML+="<br>"+"2.pop (remove at last):"+"<br>";
            array.pop(4);
            document.getElementById("non-primitive").innerHTML+="After pop operation 4 removed(updated array) : "+array.join(", ")+"<br>";

            document.getElementById("non-primitive").innerHTML+="<br>"+"3.shift (remove  at start):"+"<br>";
            array.shift();
            document.getElementById("non-primitive").innerHTML+="After shift operation 1 removed(updated array) : "+array.join(", ")+"<br>";

            document.getElementById("non-primitive").innerHTML+="<br>"+"4.unshift (add at start):"+"<br>";
            array.unshift(1);
            document.getElementById("non-primitive").innerHTML+="After unshift operation 1 added(updated array) : "+array.join(", ")+"<br>";
            
            document.getElementById("non-primitive").innerHTML+="<br>"+"5.splice (add/remove/replace in middle):"+"<br>";
            array.splice(1,1,"strac","john");//splice(start: number, deleteCount: number, ...items: (string | number)[])
            document.getElementById("non-primitive").innerHTML+="After splice operation 1 added(updated array) : "+array.join(", ")+"<br>";

            document.getElementById("non-primitive").innerHTML+="<br>"+"6.slice (its copies from start to end given indexes):"+"<br>";
            slicedarray=array.slice(0,2); //slice(start?: number, end?: number)
            document.getElementById("non-primitive").innerHTML+="After unshift operation 1 added(updated array) : "+slicedarray.join(", ")+"<br>";
            

            document.getElementById("non-primitive").innerHTML+="<br>"+"7.indexOf"+"<br>";
            document.getElementById("non-primitive").innerHTML+="Searching the index of element in array : "+array.indexOf("raju")+"<br>";

            document.getElementById("non-primitive").innerHTML+="<br>"+"8.includes"+"<br>";
            document.getElementById("non-primitive").innerHTML+="check wheather the element present or not : "+array.includes("raju")+"<br>";

            document.getElementById("non-primitive").innerHTML+="<br>"+"9.reverse"+"<br>";
            document.getElementById("non-primitive").innerHTML+="reverse the array : "+array.reverse().join(",")+"<br>";

            document.getElementById("non-primitive").innerHTML+="<br>"+"9.sort"+"<br>";
            document.getElementById("non-primitive").innerHTML+="reverse the array : "+array.sort().join(",")+"<br>";




            //2.3 Function
            function welcome() {
                return "function says welcome";
            }
            document.getElementById("non-primitive").innerHTML += "It is function we call it by function name : " + "<span style=color:'#003300';font-weight:500;>" + welcome() + "<br>" + "</span>";


            
            //2.4 date -used to display dates
            let today = new Date();
            document.getElementById("non-primitive").innerHTML += "It is date datatype : " + "<span style=color:'#003300';font-weight:500;>" + today + "<br>" + "</span>";
            
            //2.5 set -operations-.add,.delete,.has
            let s = new Set([1, 2, 3, 3, 4]);
            document.getElementById("non-primitive").innerHTML += "It is set datatype : " + "<span style=color:'#003300';font-weight:500;>" + [...s]  + "<br>" + "</span>"+"<br>";

            
            //add
            document.getElementById("non-primitive").innerHTML+="<b>"+"Set Methods :"+"</b>"+"<br>"+"<br>"+"1.add (add into set):"+"<br>";
            s.add(5);
            document.getElementById("non-primitive").innerHTML+="After add operation 5 added into set(updated set) : "+[...s]+"<br>";
            //delete
            document.getElementById("non-primitive").innerHTML+="<br>"+"2.delete (delete from set):"+"<br>";
            s.delete(5);
            document.getElementById("non-primitive").innerHTML+="After delete operation 5 delete from set(updated set) : "+[...s]+"<br>";
            //has
            document.getElementById("non-primitive").innerHTML+="<br>"+"3.has (check the element present in set):"+"<br>";
            res=s.has(1);
            document.getElementById("non-primitive").innerHTML+="Is 1 present in set ? : "+res+"<br>";
            //size
            document.getElementById("non-primitive").innerHTML+="<br>"+"4.size (size of set):"+"<br>";
            
            document.getElementById("non-primitive").innerHTML+="size of set is  : "+s.size+"<br>"+"<br>";
            //values
            document.getElementById("non-primitive").innerHTML+="<br>"+"5.values (displays a set):"+"<br>";
        
            document.getElementById("non-primitive").innerHTML+="set values  : "+[...s.values()]+"<br>"+"<br>";
            //entries
            document.getElementById("non-primitive").innerHTML+="<br>"+"6.entries(entries in set):"+"<br>";
        
            document.getElementById("non-primitive").innerHTML+="size of set is  : "+"["+[...s.entries()]+"]"+"<br>"+"<br>";

            
            //2.6 map -key-value pair like object but have more features
            let user = new Map();
            user.set("name", "ramu");
            user.set("age", 20);
            document.getElementById("non-primitive").innerHTML += "map data type : " + user.get("name") + " " + user.get("age");

        </script>

    </div>

</body>

</html>

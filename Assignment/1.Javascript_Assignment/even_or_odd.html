<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Even_or_Odd</title>
    <link rel="stylesheet" href="style.css">
</head>

<body style="text-align: center;">
    <h1> Assignment </h1>
    <h2 style="text-align: center;">Question - 5 : Even or Odd</h2>
    <br>
    <h2>Checking wheather Given number is even or odd</h2>

    <button onclick="even_odd()" style="padding: 10px;font-size: 18px;margin-left:30px">click here to know
        Answer</button> <br>
    <div id="even_odd"
        style=" border:1px solid black; padding:10px; width:400px; align-items: center; display: inline-block;">

    </div>
    <script>
        function even_odd() {
            var number = Number(prompt("enter a  number :"));
            if (number <= 0) {
                document.getElementById("even_odd").innerHTML += "Give a valid number";
            }
            else {
                if (number % 2 == 0) {
                    document.getElementById("even_odd").innerHTML += "Given number(" + number + ")" + " is : even number" + "<br>";
                }
                else {
                    document.getElementById("even_odd").innerHTML += "Given number(" + number + ")" + " is : odd number" + "<br>";
                }
            }
        }
    </script>


</body>

</html>

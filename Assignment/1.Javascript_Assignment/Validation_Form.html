<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation_Form</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            padding: 0px;
            margin: 0px;
        }

        div {
            border-radius: 10px;
        }

        .sign_in {
            background-color: #FFFFFF;
            border: #D8D8D8;
            color: #1A1A1A;
            font-size: 15px;
            text-align: left;
            border-radius: 10px;
        }

        input {
            padding: 5px;
            border-radius: 8px;
        }

        button {
            text-align: center;
        }

        body {
            background-color: #F7F9FC;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h1 {
            margin: 20px;
            color: #1A1A1A;
            font-size: 42px;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h2 {
            color: #4A90E2;
            text-align: center;
            margin: 10px;

        }

        p {
            color: #333333;
        }

        div {
            color: #2F476E;

        }
    </style>
</head>

<body>
    <h1>PROJECT</h1>
    <h2>Validation form </h2>
    <div style="text-align: center;">
        <div style="border:1px solid black;padding: 10px;width:60%;display:inline-block;">
            <div>
                <form action="">
                    <fieldset class="sign_in" style="border:1px solid #D8D8D8;padding: 10px;display:inline-block ;">
                        <legend style="text-align: center;">Sign in</legend>
                        <br>
                        <label for="name">Name : </label><input type="text" id="name" placeholder="Enter your name"
                            required><br><br>
                        <label for="branch">Branch : </label><input type="text" id="branch"
                            placeholder="enter your branch" required><br><br>
                        <label for="gender">Gender : </label><input type="radio" name="gender" value="male">
                        male</input>
                        <input type="radio" name="gender" value="female"> female</input><br><br>
                        <label for="age">Age : </label><input type="number" id="age" placeholder="enter your age"
                            required><br><br>
                        <label for="email">Email : </label><input type="email" id="email"
                            pattern="[A-Za-z0-9!@#$%^&*()_+]{30}@[a-zA-Z]{30}.[A-Za-z]{3}"
                            placeholder="example @gmail.com" required><br><br>
                        <label for="number">Phone no : </label><input type="number" id="phone"
                            pattern="+[0-9]{3}-[0-9]{10}" placeholder="+91-1234567890" required><br><br>
                        <button type="submit">Submit</button>
                    </fieldset>
                </form>
            </div>
        </div>
    </div>
</body>

</html>

<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Academy</title>


    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div id="wrapper">

        <header>
            <div id="page-banner">
                <h1>Academy</h1>
                <p>Courses Offered</p>
            </div>
        </header>

        <div id="course-list">
            <h2>Courses to Learn</h2>

            <ul>
                <li>
                    <span class="name">JavaScript</span>
                    <span class="delete">Delete</span>
                </li>
                <li>
                    <span class="name">Angular</span>
                    <span class="delete">Delete</span>
                </li>
            </ul>
        </div>

        <form id="add-course">
            <input type="text" placeholder="Enter course name">
            <button>Add Course</button>
        </form>

    </div>
    <script src="app.js" defer></script>
</body>

</html>
